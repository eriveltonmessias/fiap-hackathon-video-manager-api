spring:
  application:
    name: video-manager-api
  servlet:
    multipart:
      max-file-size: ${VIDEO_MAX_FILE_SIZE:500MB}
      max-request-size: ${VIDEO_MAX_REQUEST_SIZE:501MB}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/video_db}
    username: ${DB_USERNAME:fiapx}
    password: ${DB_PASSWORD:fiapx}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_PROCESSING_RESULTS_GROUP_ID:video-manager-processing-results}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:1000}
      mail.smtp.timeout: ${MAIL_READ_TIMEOUT:1000}
      mail.smtp.writetimeout: ${MAIL_WRITE_TIMEOUT:1000}

app:
  customer-auth:
    base-url: ${CUSTOMER_AUTH_API_URL:http://localhost:8081}
    internal-api-key: ${INTERNAL_API_KEY:local-internal-api-key}
    connect-timeout: ${CUSTOMER_AUTH_CONNECT_TIMEOUT:500ms}
    read-timeout: ${CUSTOMER_AUTH_READ_TIMEOUT:1s}
    retry-max-attempts: ${CUSTOMER_AUTH_RETRY_MAX_ATTEMPTS:3}
    retry-delay: ${CUSTOMER_AUTH_RETRY_DELAY:100ms}
    circuit-breaker-window-size: ${CUSTOMER_AUTH_CIRCUIT_WINDOW_SIZE:5}
    circuit-breaker-minimum-calls: ${CUSTOMER_AUTH_CIRCUIT_MINIMUM_CALLS:3}
    circuit-breaker-failure-rate: ${CUSTOMER_AUTH_CIRCUIT_FAILURE_RATE:50}
    circuit-breaker-open-duration: ${CUSTOMER_AUTH_CIRCUIT_OPEN_DURATION:10s}
  notifications:
    email-from: ${NOTIFICATION_EMAIL_FROM:no-reply@fiapx.local}
    telegram-bot-token: ${TELEGRAM_BOT_TOKEN:}
    telegram-connect-timeout: ${TELEGRAM_CONNECT_TIMEOUT:500ms}
    telegram-read-timeout: ${TELEGRAM_READ_TIMEOUT:1s}
  processing-results:
    retry-interval: ${PROCESSING_RESULTS_RETRY_INTERVAL:1s}
    max-retries: ${PROCESSING_RESULTS_MAX_RETRIES:2}
  outbox:
    scheduling-enabled: ${OUTBOX_SCHEDULING_ENABLED:true}
    fixed-delay: ${OUTBOX_FIXED_DELAY:1s}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    retry-delay: ${OUTBOX_RETRY_DELAY:5s}
    send-timeout: ${OUTBOX_SEND_TIMEOUT:10s}
  video-upload:
    maximum-file-size: ${VIDEO_MAX_FILE_SIZE:500MB}
    allowed-content-types:
      - video/mp4
      - video/quicktime
      - video/x-msvideo
      - video/x-matroska
      - video/webm
      - video/mpeg
    allowed-extensions:
      - mp4
      - mov
      - avi
      - mkv
      - webm
      - mpeg
      - mpg
  security:
    jwt-secret: ${JWT_SECRET:local-development-jwt-secret-change-me-1234567890}
    jwt-issuer: ${JWT_ISSUER:customer-auth-api}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:fiapx}
      secret-key: ${MINIO_SECRET_KEY:fiapx12345}
      input-bucket: ${MINIO_INPUT_BUCKET:fiapx-videos-input}
      output-bucket: ${MINIO_OUTPUT_BUCKET:fiapx-videos-output}

server:
  port: ${SERVER_PORT:8082}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
